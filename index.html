<head>

<body>
    <div class="card">
        <div class="card-body">
            <h1 class="center-heading">NLP — Emotion Detection using Watson NLP</h1>

                    <label class="form-label">Please enter the text to be analysed</label>

                    <button onclick="RunEmotionAnalysis()" class="btn btn-primary">

                    <label class="form-label">Result of Emotion Analysis</label>
